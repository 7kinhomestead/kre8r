# ─────────────────────────────────────────────────────────────────────────────
# guard.kre8r.app — GuardΩr subdomain config
#
# HOW TO DEPLOY:
#
# 1. DNS — In DigitalOcean Domains (or wherever kre8r.app DNS is managed):
#    Add an A record:
#      Type: A
#      Hostname: guard
#      Value: [same IP as kre8r.app]
#      TTL: 3600
#
# 2. Copy this file to the server:
#    sudo cp nginx-guard-subdomain.conf /etc/nginx/sites-available/guard.kre8r.app
#    sudo ln -s /etc/nginx/sites-available/guard.kre8r.app /etc/nginx/sites-enabled/
#
# 3. Get SSL cert:
#    sudo certbot --nginx -d guard.kre8r.app
#    (certbot will auto-update this file with SSL directives)
#
# 4. Reload nginx:
#    sudo nginx -t && sudo nginx -s reload
#
# HOW IT WORKS:
# Nginx receives guard.kre8r.app/7kinhomestead
# Rewrites internally to /guard/7kinhomestead on the same Express server (port 3000)
# Express serves guardr.html. Zero code changes needed.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name guard.kre8r.app;

    # Certbot will replace this block with an SSL redirect when you run certbot
    location / {
        proxy_pass         http://localhost:3000/guard$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE support — GuardΩr submit uses SSE for detection progress
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
    }
}

