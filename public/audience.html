<!DOCTYPE html>
<html lang="en">
<head>
<link rel='icon' type='image/png' href='/images/kre8r-icon.png'>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AudiencΩr — Kre8Ωr</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/global.css">
<style>
  :root {
    --bg:#0e0f0e; --bg-card:#161916; --bg-card-2:#1c1f1b; --border:#2a2e28; --border-bright:#3d4439;
    --teal:#3ecfb2; --teal-dim:#2aa893; --teal-glow:rgba(62,207,178,0.10);
    --amber:#f0b942; --amber-glow:rgba(240,185,66,0.10);
    --red:#e05c5c; --red-glow:rgba(224,92,92,0.10);
    --green:#5cba8a; --green-glow:rgba(92,186,138,0.10);
    --blue:#5b9cf6; --blue-glow:rgba(91,156,246,0.10);
    --purple:#a78bfa; --purple-glow:rgba(167,139,250,0.10);
    --text:#e8ebe6; --text-dim:#8a9487; --text-dimmer:#4e5349;
    --font-head:'Bebas Neue',sans-serif; --font-body:'DM Sans',sans-serif;
    --radius:10px; --radius-sm:6px;
  }
  *{box-sizing:border-box;margin:0;padding:0;} html{scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.55;min-height:100vh;-webkit-font-smoothing:antialiased;}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;opacity:0.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");background-size:128px;z-index:1000;}

  /* NAV */
  .topbar{position:sticky;top:0;z-index:50;background:rgba(14,15,14,0.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;}
  .logo{font-family:var(--font-head);font-size:24px;letter-spacing:2px;color:var(--text);text-decoration:none;}
  .logo .sub{color:var(--text-dimmer);font-size:11px;font-family:var(--font-body);letter-spacing:0.5px;font-weight:500;margin-left:10px;text-transform:uppercase;}
  .nav{display:flex;gap:4px;align-items:center;}
  .nav a{color:var(--text-dim);font-family:var(--font-body);font-size:12px;font-weight:500;text-decoration:none;padding:5px 10px;border-radius:var(--radius-sm);transition:all 0.15s;white-space:nowrap;}
  .nav a:hover{background:var(--bg-card-2);color:var(--text);}
  .nav a.active{background:var(--purple-glow);color:var(--purple);}

  /* LAYOUT */
  .main{max-width:860px;margin:0 auto;padding:32px 16px 100px;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

  /* HEADER */
  .page-header{margin-bottom:24px;animation:fadeUp 0.4s ease both;}
  .page-title{font-family:var(--font-head);font-size:clamp(34px,8vw,54px);letter-spacing:3px;line-height:1;color:var(--text);margin-bottom:8px;}
  .page-title em{font-style:normal;color:var(--gold);}
  .page-sub{color:var(--text-dim);font-size:14px;max-width:560px;line-height:1.6;}

  /* SECTION CARD */
  .section-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-bottom:14px;animation:fadeUp 0.4s ease both;}
  .section-label{font-family:var(--font-head);font-size:15px;letter-spacing:1.5px;color:var(--text-dim);margin-bottom:12px;}

  /* FIELDS */
  .field label{display:block;font-size:11px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-dimmer);margin-bottom:5px;}
  .field input,.field select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font-body);font-size:13px;padding:9px 12px;transition:border-color 0.15s;}
  .field input:focus,.field select:focus{outline:none;border-color:var(--teal-dim);}
  .field select{appearance:none;cursor:pointer;}

  /* BUTTONS */
  .btn{display:inline-block;white-space:nowrap;padding:7px 14px;border-radius:var(--radius-sm);font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all 0.15s;}
  .btn:active{transform:scale(0.97);}
  .btn-sm{font-size:11px;padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;}
  .btn-sm:hover{border-color:var(--gold);color:var(--gold);}
  .btn-sm.danger:hover{border-color:#ef4444;color:#ef4444;}

  /* GENERATE BTN */
  .generate-btn{width:100%;background:var(--teal);border:none;border-radius:var(--radius-sm);color:#0a0a0a;font-family:var(--font-head);font-size:20px;letter-spacing:2px;padding:16px 24px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px;}
  .generate-btn:hover{opacity:0.9;transform:translateY(-1px);}
  .generate-btn:active{transform:translateY(0);}
  .generate-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

  /* TOAST */
  .toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;}
  .toast{background:var(--bg-card);border:1px solid var(--border);padding:10px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;color:var(--text);box-shadow:0 6px 24px rgba(0,0,0,0.6);animation:toastIn 0.2s ease,toastOut 0.2s ease 2.6s forwards;}
  .toast.green{border-color:var(--green);color:var(--green);}
  .toast.amber{border-color:var(--amber);color:var(--amber);}
  .toast.red{border-color:var(--red);color:var(--red);}
  @keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes toastOut{from{opacity:1}to{opacity:0}}

  /* MOBILE */
  @media(max-width:480px){
    .main{padding:20px 12px 80px;}
    .topbar{padding:0 12px;}
    .nav a{display:none;}
    .nav a.active{display:inline-flex;}
  }

  /* AUDIENCE-SPECIFIC */
  :root { --gold:#3ecfb2; --gold-dim:rgba(20,184,166,0.1); --gold-border:rgba(20,184,166,0.25); }
  .container{max-width:1200px;margin:0 auto;padding:0 24px;}
  .page-title span{color:var(--teal);}


  .status-bar{display:flex;align-items:center;gap:10px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:20px;font-size:12px;animation:fadeUp 0.4s 0.02s ease both;}
  .status-bar.connected{border-color:rgba(92,186,138,0.3);color:var(--green);}
  .status-bar.disconnected{border-color:rgba(224,92,92,0.3);color:var(--red);}
  .status-dot{width:8px;height:8px;border-radius:50%;background:currentColor;flex-shrink:0;}

  .tabs{display:flex;gap:0;margin-bottom:20px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:4px;animation:fadeUp 0.4s 0.04s ease both;}
  .tab{flex:1;padding:10px 16px;border:none;background:none;cursor:pointer;border-radius:var(--radius-sm);font-family:var(--font-body);font-size:13px;font-weight:600;color:var(--text-dimmer);transition:all 0.15s;text-align:center;}
  .tab:hover{color:var(--text);}
  .tab.active{background:transparent;color:var(--teal);border-bottom:2px solid var(--teal);}
  .tab-panel{display:none;padding:0;}
  .tab-panel.active{display:block;animation:fadeUp 0.2s ease both;}

  .contacts-grid{display:grid;gap:8px;}
  .contact-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);}
  .contact-name{font-size:14px;font-weight:500;}
  .contact-email{font-size:12px;color:var(--text-dim);}
  .contact-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
  .contact-tag{font-size:10px;padding:2px 8px;background:var(--gold-dim);border:1px solid var(--gold-border);color:var(--gold);border-radius:4px;}
  .contact-actions{display:flex;gap:6px;flex-shrink:0;}

  .tags-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;}
  .tag-card{padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:space-between;}
  .tag-name{font-size:13px;}
  .tag-count{font-size:11px;color:var(--text-dimmer);}

  .broadcast-tag-box{display:grid;gap:12px;}
  .offers-grid{display:grid;gap:8px;}
  .offer-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);}
  .offer-name{font-size:14px;}
  .offer-price{font-size:12px;color:var(--text-dimmer);}

  .progress-bar-wrap{background:var(--bg);border-radius:4px;height:6px;margin-top:8px;overflow:hidden;}
  .progress-bar-fill{height:100%;background:var(--teal);border-radius:4px;transition:width 0.3s;}
  #tag-filter,#bc-tag-id,#bc-filter-tag,select{background:var(--bg-card);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:8px 12px;}

  .empty-state{text-align:center;padding:48px 24px;color:var(--text-dimmer);font-size:14px;}
  .pagination{display:flex;gap:8px;justify-content:center;margin-top:16px;}
  .page-btn{padding:6px 12px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-sm);cursor:pointer;font-size:12px;}
  .page-btn:disabled{opacity:0.4;cursor:not-allowed;}
  .search-row{display:flex;gap:8px;margin-bottom:12px;}
  .search-row input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:var(--radius-sm);font-size:13px;}
</style>
</head>
<body>
  <div id="kre8r-nav"></div>

  <div class="container">
  <div class="page-header">
    <h1 class="page-title">AUDIENC<span>Ω</span>R</h1>
    <p class="page-sub">Contacts, tags, offers — your Rock Rich audience in one place.</p>
  </div>

  <div id="status-bar" class="status-bar disconnected">
    <div class="status-dot"></div>
    <span id="status-text">Checking Kajabi connection…</span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('contacts')">Contacts</button>
    <button class="tab" onclick="switchTab('tags')">Tags</button>
    <button class="tab" onclick="switchTab('broadcast')">Broadcast Tag</button>
    <button class="tab" onclick="switchTab('offers')">Offers</button>
  </div>

  <!-- CONTACTS -->
  <div id="tab-contacts" class="tab-panel active">
    <div class="section-card">
      <div class="section-label">CONTACTS</div>
      <div class="search-row">
        <input type="text" id="contact-search" placeholder="Search by name or email…" oninput="filterContacts()">
        <select id="tag-filter" onchange="loadContacts(1)">
          <option value="">All contacts</option>
        </select>
      </div>
      <div id="contacts-list" class="contacts-grid">
        <div class="empty-state">Loading contacts…</div>
      </div>
      <div class="pagination" style="display:none">
        <button class="page-btn" id="prev-btn" onclick="loadContacts(currentPage-1)" disabled>← Prev</button>
        <span id="page-info" style="font-size:12px;color:var(--text-muted);padding:6px 8px;"></span>
        <button class="page-btn" id="next-btn" onclick="loadContacts(currentPage+1)" disabled>Next →</button>
      </div>
    </div>
  </div>

  <!-- TAGS -->
  <div id="tab-tags" class="tab-panel">
    <div class="section-card">
      <div class="section-label">ALL TAGS</div>
      <div id="tags-list" class="tags-grid">
        <div class="empty-state">Loading tags…</div>
      </div>
    </div>
  </div>

  <!-- BROADCAST TAG -->
  <div id="tab-broadcast" class="tab-panel">
    <div class="section-card">
      <div class="section-label">BROADCAST TAG — fire an automation to a segment</div>
      <div class="broadcast-tag-box">
        <div class="field">
          <label>TAG TO ADD</label>
          <select id="bc-tag-id">
            <option value="">Select a tag…</option>
          </select>
        </div>
        <div class="field">
          <label>SEGMENT (optional — leave blank for everyone)</label>
          <select id="bc-filter-tag">
            <option value="">Everyone</option>
          </select>
        </div>
        <div class="field">
          <label>LABEL (for your reference)</label>
          <input type="text" id="bc-label" placeholder="e.g. Rock Rich launch announcement">
        </div>
        <div id="bc-progress" style="display:none">
          <div style="font-size:12px;color:var(--text-muted)" id="bc-progress-text">Starting…</div>
          <div class="progress-bar-wrap"><div class="progress-bar-fill" id="bc-progress-bar" style="width:0%"></div></div>
        </div>
        <button class="generate-btn" id="bc-btn" onclick="broadcastTag()">FIRE TAG</button>
      </div>
    </div>
  </div>

  <!-- OFFERS -->
  <div id="tab-offers" class="tab-panel">
    <div class="section-card">
      <div class="section-label">ROCK RICH OFFERS</div>
      <div id="offers-list" class="offers-grid">
        <div class="empty-state">Loading offers…</div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let currentPage   = 1;
    let allContacts   = [];
    let allTags       = [];
    let isConnected   = false;

    // ── Init ──────────────────────────────────────────────────────────────────
    async function init() {
      await checkStatus();
      if (isConnected) {
        await loadTags();
        await loadContacts(1);
        await loadOffers();
      }
    }

    async function checkStatus() {
      const res  = await fetch('/api/kajabi/status');
      const data = await res.json();
      const bar  = document.getElementById('status-bar');
      const txt  = document.getElementById('status-text');
      isConnected = data.connected;
      if (data.connected) {
        bar.className = 'status-bar connected';
        txt.textContent = `Connected — ${data.site}`;
      } else {
        bar.className = 'status-bar disconnected';
        txt.textContent = `Not connected — ${data.reason || 'Check API credentials'}`;
      }
    }

    // ── Tabs ──────────────────────────────────────────────────────────────────
    function switchTab(name) {
      document.querySelectorAll('.tab').forEach((t,i) => {
        const names = ['contacts','tags','broadcast','offers'];
        t.classList.toggle('active', names[i] === name);
      });
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById(`tab-${name}`).classList.add('active');
    }

    // ── Contacts ──────────────────────────────────────────────────────────────
    async function loadContacts(page = 1) {
      currentPage = page;
      const tagFilter = document.getElementById('tag-filter').value;
      const url = tagFilter
        ? `/api/kajabi/contacts?tag=${encodeURIComponent(tagFilter)}&page=${page}`
        : `/api/kajabi/contacts?page=${page}`;
      const res  = await fetch(url);
      const data = await res.json();
      allContacts = data?.data || [];
      renderContacts(allContacts);
      const meta = data?.meta || {};
      document.getElementById('page-info').textContent = `Page ${page}`;
      document.getElementById('prev-btn').disabled = page <= 1;
      document.getElementById('next-btn').disabled = !meta.next_page;
    }

    function renderContacts(contacts) {
      const el = document.getElementById('contacts-list');
      if (!contacts.length) { el.innerHTML = '<div class="empty-state">No contacts found.</div>'; return; }
      el.innerHTML = contacts.map(c => {
        const a  = c.attributes || {};
        const tagRefs = (c.relationships?.tags?.data || []);
        const tags = tagRefs.map(t => {
          const tag = allTags.find(at => at.id === t.id);
          return tag ? `<span class='contact-tag'>${escHtml(tag.attributes?.name || t.id)}</span>` : '';
        }).join('');
        return `<div class="contact-row">
          <div>
            <div class="contact-name">${escHtml(a.name || a.email)}</div>
            <div class="contact-email">${escHtml(a.email)}</div>
            <div class="contact-tags" style="margin-top:4px">${tags}</div>
          </div>
          <div class="contact-actions">
            <button class="btn-sm" onclick="addTagToContact('${c.id}')">+ Tag</button>
          </div>
        </div>`;
      }).join('');
    }

    function filterContacts() {
      const q = document.getElementById('contact-search').value.toLowerCase();
      const filtered = allContacts.filter(c => {
        const a = c.attributes || {};
        return (a.name || '').toLowerCase().includes(q) || (a.email || '').toLowerCase().includes(q);
      });
      renderContacts(filtered);
    }

    async function addTagToContact(contactId) {
      const tag = allTags.find(t => {
        const name = prompt('Tag name to add:');
        return t.attributes?.name === name;
      });
      if (!tag) return;
      const res = await fetch('/api/kajabi/tag', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contact_id: contactId, tag_id: tag.id })
      });
      const data = await res.json();
      if (data.ok) showToast('Tag added', 'green');
      else showToast(data.error || 'Failed', 'red');
    }

    // ── Tags ──────────────────────────────────────────────────────────────────
    async function loadTags() {
      const res  = await fetch('/api/kajabi/tags');
      const data = await res.json();
      allTags    = data?.data || [];

      // Populate tag filter dropdowns
      const opts = allTags.map(t => `<option value="${t.id}">${escHtml(t.attributes?.name || t.id)}</option>`).join('');
      document.getElementById('tag-filter').innerHTML    = '<option value="">All contacts</option>' + opts;
      document.getElementById('bc-tag-id').innerHTML     = '<option value="">Select a tag…</option>' + opts;
      document.getElementById('bc-filter-tag').innerHTML = '<option value="">Everyone</option>' + opts;

      // Render tags tab
      const el = document.getElementById('tags-list');
      if (!allTags.length) { el.innerHTML = '<div class="empty-state">No tags found.</div>'; return; }
      el.innerHTML = allTags.map(t => `
        <div class="tag-card">
          <div class="tag-name">${escHtml(t.attributes?.name || t.id)}</div>
          <div class="tag-count">${t.attributes?.contacts_count ?? ''}</div>
        </div>`).join('');
    }

    // ── Broadcast Tag ─────────────────────────────────────────────────────────
    async function broadcastTag() {
      const tag_id        = document.getElementById('bc-tag-id').value;
      const filter_tag_id = document.getElementById('bc-filter-tag').value;
      const label         = document.getElementById('bc-label').value.trim();
      if (!tag_id) { showToast('Select a tag to add', 'amber'); return; }

      const btn = document.getElementById('bc-btn');
      btn.disabled = true;
      btn.textContent = 'FIRING…';
      document.getElementById('bc-progress').style.display = 'block';

      const res = await fetch('/api/kajabi/broadcast-tag', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tag_id, filter_tag_id: filter_tag_id || null, label })
      });

      const reader = res.body.getReader();
      const dec    = new TextDecoder();
      let buf      = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += dec.decode(value);
        const lines = buf.split('\n\n');
        buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data:')) continue;
          try {
            const ev = JSON.parse(line.slice(5).trim());
            if (ev.stage === 'progress') {
              const pct = ev.total ? Math.round((ev.tagged / ev.total) * 100) : 0;
              document.getElementById('bc-progress-bar').style.width = pct + '%';
              document.getElementById('bc-progress-text').textContent = `Tagged ${ev.tagged} of ${ev.total} contacts`;
            }
            if (ev.stage === 'done') {
              showToast(ev.message, 'green');
              document.getElementById('bc-progress-bar').style.width = '100%';
            }
            if (ev.stage === 'error') showToast(ev.error, 'red');
          } catch (_) {}
        }
      }

      btn.disabled = false;
      btn.textContent = 'FIRE TAG';
    }

    // ── Offers ────────────────────────────────────────────────────────────────
    async function loadOffers() {
      const res  = await fetch('/api/kajabi/offers');
      const data = await res.json();
      const offers = data?.data || [];
      const el   = document.getElementById('offers-list');
      if (!offers.length) { el.innerHTML = '<div class="empty-state">No offers found.</div>'; return; }
      el.innerHTML = offers.map(o => {
        const a = o.attributes || {};
        return `<div class="offer-row">
          <div>
            <div class="offer-name">${escHtml(a.name || o.id)}</div>
            <div class="offer-price">${a.price ? '$' + (a.price/100).toFixed(2) : 'Free'}</div>
          </div>
        </div>`;
      }).join('');
    }

    // ── Utils ─────────────────────────────────────────────────────────────────
    function escHtml(str) {
      return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function showToast(msg, type = 'green') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className   = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    init();
  </script>
  </div><!-- /container -->
  <script src="/js/nav.js" defer></script>
  <script>window.addEventListener('load', () => initNav())</script>
<script src="/js/bug-reporter.js"></script>
</body>
</html>
