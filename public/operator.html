<!DOCTYPE html>
<html lang="en">
<head>
<link rel='icon' type='image/png' href='/images/kre8r-icon.png'>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kre8Ωr — OperatΩr</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0e0f0e; --bg-card:#161916; --bg-card-2:#1c1f1b; --border:#2a2e28; --border-bright:#3d4439;
    --teal:#3ecfb2; --teal-dim:#2aa893; 
    --amber:#f0b942; 
    --red:#e05c5c; 
    --green:#5cba8a; 
    --blue:#5b9cf6; --purple:#a78bfa; 
    --text:#e8ebe6; --text-dim:#8a9487; --text-dimmer:#4e5349;
    --font-head:'Bebas Neue',sans-serif; --font-body:'DM Sans',sans-serif;
    --radius:10px; --radius-sm:6px;
  }
  *{box-sizing:border-box;margin:0;padding:0;} html{scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased;}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;opacity:0.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");background-size:128px;z-index:1000;}

  /* ── NAV ── */
  .topbar{position:sticky;top:0;z-index:100;background:rgba(14,15,14,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:54px;}
  .logo{font-family:var(--font-head);font-size:24px;letter-spacing:2px;color:var(--text);text-decoration:none;}
  .logo .sub{color:var(--text-dimmer);font-size:11px;font-family:var(--font-body);letter-spacing:0.5px;font-weight:500;margin-left:10px;text-transform:uppercase;}
  .nav{display:flex;gap:4px;align-items:center;}
  .nav a{color:var(--text-dim);font-family:var(--font-body);font-size:12px;font-weight:500;text-decoration:none;padding:5px 10px;border-radius:var(--radius-sm);transition:all 0.15s;white-space:nowrap;}
  .nav a:hover{background:var(--bg-card-2);color:var(--text);}
  .nav a.active{background:var(--teal-glow);color:var(--teal);}
  .nav-dropdown{position:relative;display:inline-flex;}
  .nav-drop-btn{background:none;border:none;cursor:pointer;color:var(--text-dim);font-family:var(--font-body);font-size:12px;font-weight:500;padding:5px 10px;border-radius:var(--radius-sm);transition:all 0.15s;display:inline-block;white-space:nowrap;line-height:1.5;}
  .nav-drop-btn:hover,.nav-dropdown:hover .nav-drop-btn{background:var(--bg-card-2);color:var(--text);}
  .nav-drop-btn.active{background:var(--teal-glow);color:var(--teal);}
  .nav-drop-menu{position:absolute;top:calc(100% + 6px);right:0;background:var(--bg-card);border:1px solid var(--border-bright);border-radius:var(--radius-sm);min-width:156px;display:none;z-index:300;padding:4px;box-shadow:0 8px 24px rgba(0,0,0,0.4);}
  .nav-dropdown:hover .nav-drop-menu{display:block;}
  .nav-drop-menu a{display:block;color:var(--text-dim);font-family:var(--font-body);font-size:12px;font-weight:500;text-decoration:none;padding:7px 12px;border-radius:4px;transition:all 0.15s;white-space:nowrap;}
  .nav-drop-menu a:hover{background:var(--bg-card-2);color:var(--text);}
  .nav-drop-menu a.active{background:var(--teal-glow);color:var(--teal);}
  .nav a.m-tag{font-size:11px;font-weight:700;letter-spacing:0.5px;padding:4px 9px;border-radius:20px;border:1px solid;}

  /* ── LAYOUT ── */
  .main{max-width:1300px;margin:0 auto;padding:24px 16px 80px;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

  /* ── PAGE HEADER ── */
  .page-header{margin-bottom:28px;animation:fadeUp 0.4s ease both;}
  .page-title{font-family:var(--font-head);font-size:clamp(32px,7vw,52px);letter-spacing:3px;line-height:1;color:var(--text);margin-bottom:8px;}
  .page-title em{font-style:normal;color:var(--teal);}
  .page-sub{color:var(--text-dim);font-size:14px;line-height:1.6;}

  /* ── STATUS BAR ── */
  .status-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px;animation:fadeUp 0.4s 0.05s ease both;}
  .status-pill{display:flex;align-items:center;gap:7px;background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:500;}
  .status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .dot-green{background:var(--green);}
  .dot-amber{background:var(--amber);}
  .dot-dim{background:var(--text-dimmer);}
  .status-pill .label{color:var(--text-dim);}
  .status-pill .val{color:var(--text);}

  /* ── THREE COLUMNS ── */
  .board{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;align-items:start;animation:fadeUp 0.4s 0.1s ease both;}
  @media(max-width:900px){.board{grid-template-columns:1fr;}}

  /* ── COLUMN ── */
  .col{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .col-header{padding:14px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
  .col-title{font-family:var(--font-head);font-size:19px;letter-spacing:2px;}
  .col-count{font-size:12px;color:var(--text-dim);margin-left:auto;background:var(--bg-card-2);padding:2px 9px;border-radius:10px;border:1px solid var(--border);}
  .col-body{padding:10px;}
  .col-empty{padding:28px 16px;text-align:center;color:var(--text-dimmer);font-size:13px;}

  /* Column accent colours */
  .col-queue .col-header{border-bottom-color:var(--border);}
  .col-queue .col-title{color:var(--amber);}
  .col-ready .col-title{color:var(--teal);}
  .col-archive .col-title{color:var(--green);}

  /* ── PROJECT CARDS ── */
  .proj-card{background:var(--bg-card-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px 14px;margin-bottom:8px;transition:border-color 0.15s;}
  .proj-card:last-child{margin-bottom:0;}
  .proj-card:hover{border-color:var(--border-bright);}
  .proj-title{font-weight:600;font-size:13px;color:var(--text);margin-bottom:6px;line-height:1.3;}
  .proj-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:10px;}
  .stage-badge{font-size:10px;font-weight:700;letter-spacing:0.5px;padding:2px 8px;border-radius:10px;text-transform:uppercase;}
  .stage-m2{background:var(--teal-glow);color:var(--teal);border:1px solid #2c4e48;}
  .stage-m3{background:var(--amber-glow);color:var(--amber);border:1px solid #3a3015;}
  .stage-m4{background:var(--purple-glow);color:var(--purple);border:1px solid rgba(167,139,250,0.25);}
  .stage-m5{background:var(--green-glow);color:var(--green);border:1px solid #2a4030;}
  .stage-default{background:var(--bg-card);color:var(--text-dim);border:1px solid var(--border);}
  .proj-days{font-size:11px;color:var(--text-dimmer);}
  .proj-gate{font-size:11px;color:var(--amber);}

  /* ── QUICK JUMP LINKS ── */
  .jump-links{display:flex;flex-wrap:wrap;gap:5px;}
  .jump-link{font-size:11px;font-weight:600;color:var(--teal-dim);text-decoration:none;padding:3px 9px;border-radius:var(--radius-sm);border:1px solid #203532;background:var(--teal-glow);transition:all 0.15s;white-space:nowrap;}
  .jump-link:hover{color:var(--teal);border-color:var(--teal);}

  /* ── PLATFORM CHECKLIST ── */
  .platform-list{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
  .platform-item{display:flex;align-items:center;gap:9px;padding:5px 8px;border-radius:var(--radius-sm);cursor:pointer;transition:background 0.12s;user-select:none;}
  .platform-item:hover{background:rgba(255,255,255,0.03);}
  .platform-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border-bright);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;background:var(--bg);}
  .platform-check.checked{background:var(--teal);border-color:var(--teal);}
  .platform-check.checked::after{content:'✓';font-size:10px;font-weight:700;color:#0e0f0e;}
  .platform-name{font-size:12px;font-weight:500;color:var(--text-dim);flex:1;}
  .platform-item.done .platform-name{color:var(--text-dimmer);text-decoration:line-through;}
  .platform-badge-sm{font-size:10px;font-weight:700;padding:1px 7px;border-radius:8px;text-transform:uppercase;}
  .pb-tiktok{background:rgba(255,0,80,0.10);color:#ff0050;}
  .pb-youtube{background:rgba(255,70,70,0.10);color:#ff4646;}
  .pb-instagram{background:rgba(228,64,95,0.10);color:#e4405f;}
  .pb-facebook{background:rgba(66,103,178,0.12);color:#6b8fd4;}
  .pb-lemon8{background:rgba(255,212,0,0.10);color:#e8b800;}
  .analytics-link{display:inline-block;white-space:nowrap;gap:5px;font-size:11px;color:var(--teal-dim);text-decoration:none;margin-top:8px;}
  .analytics-link:hover{color:var(--teal);}

  /* ── ARCHIVE CARD ── */
  .archive-dates{font-size:11px;color:var(--text-dimmer);margin-top:4px;}
  .archive-metric{display:flex;align-items:center;gap:8px;margin-top:8px;padding:7px 10px;background:var(--bg-card);border-radius:var(--radius-sm);border:1px solid var(--border);}
  .archive-metric-val{font-family:var(--font-head);font-size:20px;letter-spacing:0.5px;color:var(--green);}
  .archive-metric-label{font-size:11px;color:var(--text-dimmer);}

  /* ── REFRESH BTN ── */
  .btn{display:inline-block;white-space:nowrap;gap:7px;font-family:var(--font-body);font-size:13px;font-weight:600;padding:8px 16px;border-radius:var(--radius-sm);border:none;cursor:pointer;transition:all 0.15s;}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-dim);}
  .btn-ghost:hover{border-color:var(--teal);color:var(--teal);}

  /* ── TOAST ── */
  .toast{position:fixed;bottom:24px;right:24px;z-index:600;background:var(--bg-card);border:1px solid var(--border-bright);border-radius:var(--radius-sm);padding:12px 18px;font-size:13px;font-weight:500;transform:translateY(100px);opacity:0;transition:all 0.25s;pointer-events:none;}
  .toast.show{transform:translateY(0);opacity:1;}
  .toast.ok{border-color:var(--green);color:var(--green);}
  .toast.err{border-color:var(--red);color:var(--red);}
</style>
</head>
<body>

<!-- ── TOP BAR ── -->
<header class="topbar">
  <a href="/" class="logo">KRE<span style="color:var(--teal)">8Ω</span>R</a>
  <nav class="nav">
    <a href="/">PipelineΩr</a>
    <a href="vault.html">VaultΩr</a>
    <a href="editor.html">EditΩr</a>
    <a href="composor.html">ComposΩr</a>
    <a href="reviewr.html">ReviewΩr</a>
    <a href="m5-analytics.html">AnalytΩr</a>
    <a href="operator.html" class="active">OperatΩr</a>
    <div class="nav-dropdown">
      <button class="nav-drop-btn m-tag" style="background:#151b18;color:var(--teal-dim);border:1px solid #2c4e48;">Distribut<span style="color:var(--teal)">Ω</span>r ▾</button>
      <div class="nav-drop-menu">
        <a href="m1-approval-dashboard.html">GateΩr</a>
        <a href="m2-package-generator.html">PackageΩr</a>
        <a href="m3-caption-generator.html">CaptionΩr</a>
        <a href="m4-email-generator.html">MailΩr</a>
      </div>
    </div>
  </nav>
</header>

<!-- ── MAIN ── -->
<main class="main">

  <div class="page-header">
    <h1 class="page-title">OPERAT<em>Ω</em>R</h1>
    <p class="page-sub">Master pipeline view — everything in motion, across every project, at a glance.</p>
  </div>

  <!-- Status bar -->
  <div class="status-bar" id="status-bar">
    <div class="status-pill"><span class="status-dot dot-amber"></span><span class="label">Queue</span>&nbsp;<span class="val" id="stat-queue">—</span></div>
    <div class="status-pill"><span class="status-dot dot-green" style="background:var(--teal)"></span><span class="label">Ready to Publish</span>&nbsp;<span class="val" id="stat-ready">—</span></div>
    <div class="status-pill"><span class="status-dot dot-green"></span><span class="label">Archived</span>&nbsp;<span class="val" id="stat-archive">—</span></div>
    <button class="btn btn-ghost" style="margin-left:auto;" onclick="loadBoard()">↻ Refresh</button>
  </div>

  <!-- Board -->
  <div class="board">

    <!-- LEFT: Queue -->
    <div class="col col-queue">
      <div class="col-header">
        <span class="col-title">QUEUE</span>
        <span class="col-count" id="count-queue">0</span>
      </div>
      <div class="col-body" id="col-queue-body">
        <div class="col-empty">Loading…</div>
      </div>
    </div>

    <!-- CENTER: Ready to Publish -->
    <div class="col col-ready">
      <div class="col-header">
        <span class="col-title">READY TO PUBLISH</span>
        <span class="col-count" id="count-ready">0</span>
      </div>
      <div class="col-body" id="col-ready-body">
        <div class="col-empty">Loading…</div>
      </div>
    </div>

    <!-- RIGHT: Archive -->
    <div class="col col-archive">
      <div class="col-header">
        <span class="col-title">ARCHIVE</span>
        <span class="col-count" id="count-archive">0</span>
      </div>
      <div class="col-body" id="col-archive-body">
        <div class="col-empty">Loading…</div>
      </div>
    </div>

  </div>
</main>

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────
const PLATFORMS = [
  { key: 'tiktok',    label: 'TikTok',    badge: 'pb-tiktok' },
  { key: 'youtube',   label: 'YouTube',   badge: 'pb-youtube' },
  { key: 'instagram', label: 'Instagram', badge: 'pb-instagram' },
  { key: 'facebook',  label: 'Facebook',  badge: 'pb-facebook' },
  { key: 'lemon8',    label: 'Lemon8',    badge: 'pb-lemon8' }
];

const STAGE_LABELS = {
  'M2': 'Packages', 'M3': 'Captions', 'M3-captions': 'Captions',
  'M4': 'Emails', 'M4-emails': 'Emails', 'M5': 'Emails Done'
};
const STAGE_CLASSES = {
  'M2': 'stage-m2', 'M3': 'stage-m3', 'M3-captions': 'stage-m3',
  'M4': 'stage-m4', 'M4-emails': 'stage-m4', 'M5': 'stage-m5'
};
const GATE_LABELS = {
  gate_a: 'Gate A: Package not selected',
  gate_b: 'Gate B: Captions not approved',
  gate_c: 'Gate C: Emails not approved'
};

// ─────────────────────────────────────────────
// LOAD
// ─────────────────────────────────────────────
async function loadBoard() {
  try {
    const res = await fetch('/api/operator');
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    renderBoard(data);
  } catch (err) {
    showToast('Failed to load: ' + err.message, 'err');
    document.querySelectorAll('.col-body').forEach(el => {
      el.innerHTML = `<div class="col-empty" style="color:var(--red)">Error loading data</div>`;
    });
  }
}

function renderBoard(data) {
  // Stats
  document.getElementById('stat-queue').textContent   = data.queue.length;
  document.getElementById('stat-ready').textContent   = data.ready.length;
  document.getElementById('stat-archive').textContent = data.archive.length;
  document.getElementById('count-queue').textContent   = data.queue.length;
  document.getElementById('count-ready').textContent   = data.ready.length;
  document.getElementById('count-archive').textContent = data.archive.length;

  renderQueue(data.queue);
  renderReady(data.ready);
  renderArchive(data.archive);
}

// ─────────────────────────────────────────────
// QUEUE COLUMN
// ─────────────────────────────────────────────
function renderQueue(projects) {
  const body = document.getElementById('col-queue-body');
  if (projects.length === 0) {
    body.innerHTML = '<div class="col-empty">No projects in queue — all caught up!</div>';
    return;
  }
  body.innerHTML = projects.map(p => buildQueueCard(p)).join('');
}

function buildQueueCard(p) {
  const stage      = p.stage_status || 'M2';
  const stageLabel = STAGE_LABELS[stage] || stage;
  const stageClass = STAGE_CLASSES[stage] || 'stage-default';
  const days       = p.created_at ? Math.floor((Date.now() - new Date(p.created_at)) / 86400000) : '?';

  // Determine blocking gate
  let blockingGate = '';
  if (!p.gate_a_approved)      blockingGate = GATE_LABELS.gate_a;
  else if (!p.gate_b_approved) blockingGate = GATE_LABELS.gate_b;
  else if (!p.gate_c_approved) blockingGate = GATE_LABELS.gate_c;

  // Quick jump links based on stage
  const links = [];
  if (!p.gate_a_approved) links.push(`<a class="jump-link" href="m2-package-generator.html?project_id=${p.id}">PackageΩr →</a>`);
  else if (!p.gate_b_approved) links.push(`<a class="jump-link" href="m3-caption-generator.html?project_id=${p.id}">CaptionΩr →</a>`);
  else if (!p.gate_c_approved) links.push(`<a class="jump-link" href="m4-email-generator.html?project_id=${p.id}">MailΩr →</a>`);

  return `<div class="proj-card">
    <div class="proj-title">${escHtml(p.title)}</div>
    <div class="proj-meta">
      <span class="stage-badge ${stageClass}">${stageLabel}</span>
      <span class="proj-days">${days}d old</span>
      ${blockingGate ? `<span class="proj-gate">⚠ ${escHtml(blockingGate)}</span>` : ''}
    </div>
    <div class="jump-links">${links.join('')}</div>
  </div>`;
}

// ─────────────────────────────────────────────
// READY TO PUBLISH COLUMN
// ─────────────────────────────────────────────
function renderReady(projects) {
  const body = document.getElementById('col-ready-body');
  if (projects.length === 0) {
    body.innerHTML = '<div class="col-empty">No projects ready yet — approve Gate C to move projects here.</div>';
    return;
  }
  body.innerHTML = '';
  projects.forEach(p => {
    const card = document.createElement('div');
    card.className = 'proj-card';
    card.innerHTML = buildReadyCard(p);
    body.appendChild(card);
  });
}

function buildReadyCard(p) {
  const postedSet = new Set(p.posted_platforms || []);
  const platformItems = PLATFORMS.map(pl => {
    const done = postedSet.has(pl.key);
    return `<div class="platform-item${done ? ' done' : ''}" data-project="${p.id}" data-platform="${pl.key}" onclick="togglePosted(${p.id}, '${pl.key}', this)">
      <div class="platform-check${done ? ' checked' : ''}"></div>
      <span class="platform-name">${pl.label}</span>
      <span class="platform-badge-sm ${pl.badge}">${pl.label}</span>
    </div>`;
  }).join('');

  return `<div class="proj-title">${escHtml(p.title)}</div>
    <div class="platform-list">${platformItems}</div>
    <a class="analytics-link" href="m5-analytics.html?project_id=${p.id}">📊 View Analytics →</a>`;
}

async function togglePosted(projectId, platform, itemEl) {
  const checkEl = itemEl.querySelector('.platform-check');
  const isDone  = checkEl.classList.contains('checked');
  const endpoint = isDone ? '/api/operator/unmark-posted' : '/api/operator/mark-posted';

  try {
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ project_id: projectId, platform })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);

    checkEl.classList.toggle('checked');
    itemEl.classList.toggle('done');
    showToast(isDone ? `${platform} unmarked` : `${platform} marked posted`, 'ok');

    // Re-check if all platforms done → reload board to move card to archive
    const allChecked = itemEl.closest('.proj-card')
      .querySelectorAll('.platform-check.checked').length === PLATFORMS.length;
    if (allChecked || isDone) {
      setTimeout(() => loadBoard(), 600);
    }
  } catch (err) {
    showToast('Error: ' + err.message, 'err');
  }
}

// ─────────────────────────────────────────────
// ARCHIVE COLUMN
// ─────────────────────────────────────────────
function renderArchive(projects) {
  const body = document.getElementById('col-archive-body');
  if (projects.length === 0) {
    body.innerHTML = '<div class="col-empty">No completed projects yet.</div>';
    return;
  }
  body.innerHTML = projects.map(p => buildArchiveCard(p)).join('');
}

function buildArchiveCard(p) {
  const postedDates = (p.posts || [])
    .filter(post => post.posted_at)
    .sort((a, b) => new Date(b.posted_at) - new Date(a.posted_at));
  const latestDate = postedDates[0]?.posted_at
    ? new Date(postedDates[0].posted_at).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'})
    : '';

  // Top metric across all posts
  const allMetrics = (p.posts || []).flatMap(post =>
    Object.entries(post.metrics || {})
      .filter(([k]) => k === 'views')
      .map(([,v]) => v)
  );
  const totalViews = allMetrics.reduce((a, b) => a + b, 0);

  return `<div class="proj-card">
    <div class="proj-title">${escHtml(p.title)}</div>
    ${latestDate ? `<div class="archive-dates">Last posted: ${latestDate}</div>` : ''}
    ${totalViews > 0 ? `
    <div class="archive-metric">
      <div>
        <div class="archive-metric-val">${fmtNum(totalViews)}</div>
        <div class="archive-metric-label">total views</div>
      </div>
    </div>` : ''}
    <a class="analytics-link" href="m5-analytics.html?project_id=${p.id}" style="margin-top:${totalViews > 0 ? '0' : '8px'};">📊 Analytics →</a>
  </div>`;
}

// ─────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────
function fmtNum(n) {
  if (!n && n !== 0) return '—';
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
  if (n >= 1_000)     return (n / 1_000).toFixed(1) + 'K';
  return String(Math.round(n));
}

function escHtml(str) {
  return String(str || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

let toastTimer;
function showToast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ─────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', loadBoard);
</script>
<script src="/js/bug-reporter.js"></script>
