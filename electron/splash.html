<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kre8Ωr</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0e0f0e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'DM Sans', sans-serif;
    color: #00c2a8;
    border-radius: 12px;
    overflow: hidden;
    -webkit-app-region: drag;
    user-select: none;
  }

  .icon-wrap {
    width: 80px;
    height: 80px;
    margin-bottom: 20px;
    border-radius: 16px;
    overflow: hidden;
  }

  .icon-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 6px;
    color: #00c2a8;
    margin-bottom: 6px;
    line-height: 1;
  }

  .tagline {
    font-size: 10px;
    color: #ffffff;
    opacity: 0.35;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 36px;
  }

  .loading-text {
    font-size: 11px;
    color: #00c2a8;
    opacity: 0.6;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 14px;
    animation: pulse 1.8s ease-in-out infinite;
  }

  .bar-wrap {
    width: 180px;
    height: 2px;
    background: #1c1f1b;
    border-radius: 1px;
  }

  .bar {
    height: 2px;
    background: linear-gradient(90deg, #009e88, #00d4b8);
    border-radius: 1px;
    width: 0%;
    animation: load 2.4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
  }

  @keyframes load {
    0%   { width: 0%;   opacity: 1; }
    60%  { width: 75%;  opacity: 1; }
    85%  { width: 92%;  opacity: 1; }
    100% { width: 100%; opacity: 0; }
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.6; }
    50%       { opacity: 0.3; }
  }

  .version {
    position: absolute;
    bottom: 18px;
    right: 20px;
    font-size: 10px;
    color: #2e3329;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="icon-wrap">
    <img src="../public/images/kre8r-icon.png" alt="Kre8Ωr" onerror="this.style.display='none'">
  </div>
  <div class="logo">KRE8ΩR</div>
  <div class="tagline">Sine Resistentia</div>
  <div class="loading-text">Starting your creative universe</div>
  <div class="bar-wrap"><div class="bar"></div></div>
  <div class="version">v1.0</div>
</body>
</html>
